<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call of Duty MW3 - Персонажі</title>
    <style>
        /* Базові налаштування */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            
        }

        /* Контейнер для анімації на задньому фоні */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* Обгортка для всього контенту сайту */
        .content-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрує все по горизонталі */
            width: 100%;
            padding-bottom: 50px;
        }

        header {
            padding: 30px 0 10px 0;
            text-align: center;
            width: 100%;
        }

        header h1 {
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5); /* Червоне світіння */
        }

        /* --- СІТКА З 9 КВАДРАТІВ --- */
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 колонки */
            gap: 20px; /* Відстань між квадратами */
            width: 90%;
            max-width: 900px;
            margin: 30px auto;
        }

        /* Обгортка для кожного персонажа */
        .char-square {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; /* Ідеальний квадрат */
            background-color: #111;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        /* Налаштування тегу <img>, щоб він заповнював квадрат */
        .char-square img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Зберігає пропорції, обрізаючи зайве */
            display: block;
        }

        /* Ефект при наведенні */
        .char-square:hover {
            transform: scale(1.05); /* Збільшення */
            border-color: #ff1a1a; /* Червона рамка */
            box-shadow: 0 10px 20px rgba(255, 26, 26, 0.3);
            z-index: 2;
        }

        /* Ім'я персонажа поверх картинки */
        .char-name {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            text-align: center;
            padding: 12px 0;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 26, 26, 0.3);
        }

        /* --- СЕКЦІЯ ВІДЕО --- */
        .video-section {
            margin-top: 50px;
            text-align: center;
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрує відео всередині секції */
        }

        .video-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff1a1a;
        }

        /* Контейнер для адаптивного відео */
        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Пропорції 16:9 */
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Текст під відео */
        .footer-text {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: #aaa;
        }

        .footer-text a {
            color: #ff1a1a;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        /* Адаптивність */
        @media (max-width: 768px) {
            .characters-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 480px) {
            .characters-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="content-wrapper">

    <header>
        <h1>Фановий сайт</h1>
    </header>

    <header>
        <h1>Оперативної групи 141</h1>
    </header>

    <div class="characters-grid">
        <div class="char-square">
            <img src="price.jpg" alt="Captain Price">
            <div class="char-name">Captain Price</div>
        </div>
        <div class="char-square">
            <img src="ghost.jpg" alt="Ghost">
            <div class="char-name">Ghost</div>
        </div>
        <div class="char-square">
            <img src="soap.jpg" alt="Soap">
            <div class="char-name">Soap</div>
        </div>
        <div class="char-square">
            <img src="gaz.jpg" alt="Gaz">
            <div class="char-name">Gaz</div>
        </div>
        <div class="char-square">
            <img src="makarov.jpg" alt="Makarov">
            <div class="char-name">Makarov</div>
        </div>
        <div class="char-square">
            <img src="farah.jpg" alt="Farah">
            <div class="char-name">Farah</div>
        </div>
        <div class="char-square">
            <img src="alex.jpg" alt="Alex">
            <div class="char-name">Alex</div>
        </div>
        <div class="char-square">
            <img src="graves.jpg" alt="Graves">
            <div class="char-name">Graves</div>
        </div>
        <div class="char-square">
            <img src="valeria.jpg" alt="Valeria">
            <div class="char-name">Valeria</div>
        </div>
    </div>

    <div class="video-section">
        <div class="video-title">Офіційний трейлер MW3</div>
        <div class="iframe-container">
            <iframe src="https://www.youtube.com/watch?v=i3IsLrPeZG8" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>

        <div class="footer-text">
            <p>Call of Duty: Modern Warfare III (2023)</p>
            <a href="https://www.callofduty.com/playnow/modernwarfare3" target="_blank">Придбати гру</a>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#ff1a1a" }, /* ЗМІНЕНО: Колір точок (червоний) */
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5, "random": false },
            "size": { "value": 3, "random": true },
            "line_linked": {
                "enable": true,
                "distance": 150,
                "color": "#ff1a1a", /* ЗМІНЕНО: Колір ліній (червоний) */
                "opacity": 0.4,
                "width": 1
            },
            "move": {
                "enable": true,
                "speed": 2,
                "direction": "none",
                "random": false,
                "straight": false,
                "out_mode": "out",
                "bounce": false
            }
        },
        "interactivity": {
            "detect_on": "canvas",
            "events": {
                "onhover": { "enable": true, "mode": "grab" },
                "onclick": { "enable": true, "mode": "push" },
                "resize": true
            },
            "modes": {
                "grab": { "distance": 140, "line_linked": { "opacity": 1 } }
            }
        },
        "retina_detect": true
    });
</script>

</body>
</html>
